<h1>My BitShelf Collection</h1>

<nav>
  <a routerLink="/search" routerLinkActive="active">Search</a>
  <a routerLink="/collection" routerLinkActive="active">My Collection</a>
</nav>

<router-outlet></router-outlet>

<div class="modal-overlay" *ngIf="showForm" (click)="onFormClosed()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <app-game-form
      [gameToEdit]="gameToEdit"
      (formSubmitted)="onFormSubmitted()"
      (formCancelled)="onFormClosed()">
    </app-game-form>
  </div>
</div>
