<div class="game-search">
    <h2>Search for a Game</h2>
  
    <div class="search-bar">
      <input
        type="text"
        [(ngModel)]="searchTerm"
        placeholder="Search IGDB e.g. 'Zelda', 'Halo'..."
        (keyup.enter)="onSearch()"
      />
      <button (click)="onSearch()" [disabled]="isSearching">
        {{ isSearching ? 'Searching...' : 'Search' }}
      </button>
    </div>
  
    <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
  
    <div class="results-grid" *ngIf="results.length > 0">
      <div class="result-card" *ngFor="let game of results">
        <img [src]="getCoverUrl(game.cover?.url)" [alt]="game.name" />
        <div class="result-info">
          <h3>{{ game.name }}</h3>
          <p class="platforms" *ngIf="game.platforms?.length">
            {{ game.platforms?.[0]?.name }}
          </p>
          <p class="summary" *ngIf="game.summary">
            {{ game.summary.length > 120 ? (game.summary | slice:0:120) + '...' : game.summary }}
          </p>
          <button (click)="addToCollection(game)">Add to Collection</button>
        </div>
      </div>
    </div>

  </div>
