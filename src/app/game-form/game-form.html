<div class="game-form">
  <h2>{{ gameToEdit ? 'Edit Game' : 'Add Game' }}</h2>

  <p *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</p>

  <form (ngSubmit)="onCancel()">
    <div class="form-group">
      <label for="title">Title *</label>
      <input id="title" type="text" [(ngModel)]="title" name="title" required />
    </div>

    <div class="form-group">
      <label for="platform">Platform *</label>
      <select id="platform" [(ngModel)]="platformId" name="platformId" required>
        <option [ngValue]="null" disabled>Select a platform</option>
        <option *ngFor="let p of platforms" [ngValue]="p.id">{{ p.name }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="genre">Genre</label>
      <input id="genre" type="text" [(ngModel)]="genre" name="genre" />
    </div>

    <div class="form-group">
      <label for="releaseDate">Release Date</label>
      <input id="releaseDate" type="date" [(ngModel)]="releaseDate" name="releaseDate" />
    </div>

    <div class="form-group">
      <label for="condition">Condition</label>
      <select id="condition" [(ngModel)]="condition" name="condition">
        <option value="">Select condition</option>
        <option value="New">New</option>
        <option value="Used">Used (CIB)</option>
        <option value="Loose">Loose</option>
        <option value="Damaged">Damaged</option>
      </select>
    </div>

    <div class="form-group checkbox">
      <label>
        <input type="checkbox" [(ngModel)]="played" name="played" />
        Played
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" (click)="onCancel()">Cancel</button>
    </div>
  </form>
</div>
